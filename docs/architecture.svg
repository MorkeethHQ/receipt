<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <text x="600" y="50" text-anchor="middle" fill="#ededed" font-family="monospace" font-size="28" font-weight="bold">RECEIPT — Proof Layer for Agent Work</text>
  <text x="600" y="75" text-anchor="middle" fill="#888" font-family="monospace" font-size="14">Signed, hash-linked receipts for verifiable agent handoffs</text>

  <!-- Agent A -->
  <rect x="50" y="110" width="320" height="330" rx="8" fill="#141414" stroke="#3b82f6" stroke-width="2"/>
  <text x="210" y="140" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="16" font-weight="bold">Agent A (Researcher)</text>

  <rect x="70" y="160" width="280" height="30" rx="4" fill="#1a2332" stroke="#2a3a4a"/>
  <text x="80" y="180" fill="#f97316" font-family="monospace" font-size="12">file_read</text>
  <text x="160" y="180" fill="#888" font-family="monospace" font-size="11">→ receipt₁ (ed25519 sig)</text>

  <rect x="70" y="200" width="280" height="30" rx="4" fill="#1a2332" stroke="#2a3a4a"/>
  <text x="80" y="220" fill="#a855f7" font-family="monospace" font-size="12">api_call</text>
  <text x="160" y="220" fill="#888" font-family="monospace" font-size="11">→ receipt₂ (prevId: r₁)</text>

  <rect x="70" y="240" width="280" height="30" rx="4" fill="#1a2332" stroke="#2a3a4a"/>
  <text x="80" y="260" fill="#22c55e" font-family="monospace" font-size="12">llm_call</text>
  <text x="160" y="260" fill="#888" font-family="monospace" font-size="11">→ receipt₃ (TEE attested)</text>

  <rect x="70" y="280" width="280" height="30" rx="4" fill="#1a2332" stroke="#2a3a4a"/>
  <text x="80" y="300" fill="#3b82f6" font-family="monospace" font-size="12">decision</text>
  <text x="160" y="300" fill="#888" font-family="monospace" font-size="11">→ receipt₄ (prevId: r₃)</text>

  <rect x="70" y="320" width="280" height="30" rx="4" fill="#1a2332" stroke="#2a3a4a"/>
  <text x="80" y="340" fill="#ef4444" font-family="monospace" font-size="12">output</text>
  <text x="160" y="340" fill="#888" font-family="monospace" font-size="11">→ receipt₅ (chain root)</text>

  <text x="210" y="390" text-anchor="middle" fill="#555" font-family="monospace" font-size="11">SHA-256 hash chain</text>
  <text x="210" y="410" text-anchor="middle" fill="#555" font-family="monospace" font-size="11">ed25519 signatures</text>
  <text x="210" y="430" text-anchor="middle" fill="#555" font-family="monospace" font-size="11">each receipt links to prev via prevId</text>

  <!-- Handoff Arrow -->
  <line x1="370" y1="275" x2="480" y2="275" stroke="#22c55e" stroke-width="2" stroke-dasharray="8,4" filter="url(#glow)"/>
  <polygon points="475,270 485,275 475,280" fill="#22c55e"/>
  <text x="425" y="260" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="11">handoff</text>
  <text x="425" y="295" text-anchor="middle" fill="#555" font-family="monospace" font-size="9">bundle + pubkey</text>

  <!-- Agent B -->
  <rect x="490" y="110" width="320" height="330" rx="8" fill="#141414" stroke="#a855f7" stroke-width="2"/>
  <text x="650" y="140" text-anchor="middle" fill="#a855f7" font-family="monospace" font-size="16" font-weight="bold">Agent B (Builder)</text>

  <rect x="510" y="160" width="280" height="30" rx="4" fill="#1a1a2e" stroke="#2a2a4a"/>
  <text x="520" y="180" fill="#22c55e" font-family="monospace" font-size="12">verify</text>
  <text x="580" y="180" fill="#888" font-family="monospace" font-size="11">→ check all 5 sigs + links</text>

  <rect x="510" y="200" width="280" height="30" rx="4" fill="#2d1b1b" stroke="#4a2a2a"/>
  <text x="520" y="220" fill="#ef4444" font-family="monospace" font-size="12">tampered?</text>
  <text x="600" y="220" fill="#ef4444" font-family="monospace" font-size="11">→ REFUSE handoff</text>

  <rect x="510" y="250" width="280" height="30" rx="4" fill="#1a1a2e" stroke="#2a2a4a"/>
  <text x="520" y="270" fill="#a855f7" font-family="monospace" font-size="12">continueFrom()</text>
  <text x="630" y="270" fill="#888" font-family="monospace" font-size="11">→ extend chain</text>

  <rect x="510" y="290" width="280" height="30" rx="4" fill="#1a1a2e" stroke="#2a2a4a"/>
  <text x="520" y="310" fill="#a855f7" font-family="monospace" font-size="12">receipt₆..₉</text>
  <text x="620" y="310" fill="#888" font-family="monospace" font-size="11">→ build on verified chain</text>

  <rect x="510" y="340" width="280" height="30" rx="4" fill="#1a1a2e" stroke="#2a2a4a"/>
  <text x="520" y="360" fill="#22c55e" font-family="monospace" font-size="12">root hash</text>
  <text x="610" y="360" fill="#888" font-family="monospace" font-size="11">→ SHA-256(last receipt)</text>

  <text x="650" y="410" text-anchor="middle" fill="#555" font-family="monospace" font-size="11">9 receipts total</text>
  <text x="650" y="430" text-anchor="middle" fill="#555" font-family="monospace" font-size="11">cross-agent verified chain</text>

  <!-- AXL P2P -->
  <rect x="870" y="110" width="280" height="140" rx="8" fill="#141414" stroke="#f97316" stroke-width="2"/>
  <text x="1010" y="140" text-anchor="middle" fill="#f97316" font-family="monospace" font-size="14" font-weight="bold">Gensyn AXL</text>
  <text x="1010" y="165" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">P2P agent communication</text>
  <text x="1010" y="185" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">POST /send (peer-to-peer)</text>
  <text x="1010" y="200" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">GET /recv (poll for msgs)</text>
  <text x="1010" y="215" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">GET /topology (discover peers)</text>
  <text x="1010" y="235" text-anchor="middle" fill="#f97316" font-family="monospace" font-size="10">sendHandoff() / recvHandoff()</text>

  <!-- KeeperHub -->
  <rect x="870" y="270" width="280" height="120" rx="8" fill="#141414" stroke="#3b82f6" stroke-width="2"/>
  <text x="1010" y="300" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="14" font-weight="bold">KeeperHub</text>
  <text x="1010" y="320" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">Automated anchoring</text>
  <text x="1010" y="340" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">Webhook trigger → verify → store → anchor</text>
  <text x="1010" y="355" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">Cron: */10 * * * * (every 10 min)</text>
  <text x="1010" y="375" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="10">scheduleAnchor() / triggerAnchor()</text>

  <!-- 0G Trifecta -->
  <rect x="100" y="490" width="250" height="140" rx="8" fill="#141414" stroke="#22c55e" stroke-width="2"/>
  <text x="225" y="520" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="14" font-weight="bold">0G Compute</text>
  <text x="225" y="540" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">TEE-attested inference</text>
  <text x="225" y="560" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">Intel TDX hardware enclaves</text>
  <text x="225" y="580" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">Attestation → receipt metadata</text>
  <text x="225" y="600" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">Provider: 0x1B3A...DEB0</text>
  <text x="225" y="620" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">inferWithAttestation()</text>

  <rect x="400" y="490" width="250" height="140" rx="8" fill="#141414" stroke="#22c55e" stroke-width="2"/>
  <text x="525" y="520" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="14" font-weight="bold">0G Storage</text>
  <text x="525" y="540" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">Content-addressed persistence</text>
  <text x="525" y="560" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">Merkle tree root computation</text>
  <text x="525" y="580" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">storageRef → anchor contract</text>
  <text x="525" y="600" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">Galileo testnet (chain 16602)</text>
  <text x="525" y="620" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">storeChainOn0G()</text>

  <rect x="700" y="490" width="250" height="140" rx="8" fill="#141414" stroke="#22c55e" stroke-width="2"/>
  <text x="825" y="520" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="14" font-weight="bold">0G Chain</text>
  <text x="825" y="540" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">On-chain anchor</text>
  <text x="825" y="560" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">ReceiptAnchor.sol</text>
  <text x="825" y="580" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">anchorRoot(rootHash, storageRef)</text>
  <text x="825" y="600" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">Mainnet (chain 16661)</text>
  <text x="825" y="620" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">anchorOnChain()</text>

  <!-- Base Sepolia -->
  <rect x="400" y="660" width="250" height="90" rx="8" fill="#141414" stroke="#3b82f6" stroke-width="2"/>
  <text x="525" y="690" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="14" font-weight="bold">Base Sepolia</text>
  <text x="525" y="710" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">Secondary anchor chain</text>
  <text x="525" y="730" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">Same ReceiptAnchor.sol contract</text>
  <text x="525" y="745" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">Chain ID: 84532</text>

  <!-- Connecting lines -->
  <line x1="525" y1="440" x2="225" y2="490" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="525" y1="440" x2="525" y2="490" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="525" y1="440" x2="825" y2="490" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="525" y1="630" x2="525" y2="660" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>

  <line x1="810" y1="275" x2="870" y2="200" stroke="#f97316" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="810" y1="330" x2="870" y2="330" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
</svg>
